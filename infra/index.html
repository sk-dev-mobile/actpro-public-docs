<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>АктПро - Инфраструктура</title>
  <style>
    :root { --bg:#f5f7fb; --card:#fff; --line:#d9dee7; --text:#1f2328; --muted:#5b6472; --accent:#2d6df6; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.5 "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif; }
    .page { max-width:980px; margin:0 auto; padding:32px 24px 48px; }
    .back { color:var(--accent); text-decoration:none; font-size:14px; }
    h1 { margin:10px 0 12px; font-size:30px; }
    .card { border:1px solid var(--line); border-radius:12px; background:var(--card); padding:18px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="../index.html">Назад к порталу</a>
    <h1>Инфраструктура</h1>
    <div class="card">
      Здесь будут размещаться публичные материалы по инфраструктуре проекта и файловому хранилищу.
    </div>
  </div>
</body>
</html>
